name: Deploy Frontend para Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Preparar arquivos para deploy
        run: |
          mkdir -p deploy_ftp/.next
          cp .next/standalone/server.js deploy_ftp/server.js
          cp -r .next/standalone/.next/. deploy_ftp/.next/
          cp -r .next/static deploy_ftp/.next/static
          cp -r public deploy_ftp/public

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_ftp/
          server-dir: domains/razepag.com/nodejs/
          dangerous-clean-slate: true
