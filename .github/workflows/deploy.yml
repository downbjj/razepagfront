name: Deploy Frontend para Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Preparar arquivos do servidor (nodejs)
        run: |
          mkdir -p deploy_server/.next
          cp .next/standalone/server.js deploy_server/server.js
          cp -r .next/standalone/.next/. deploy_server/.next/

      - name: Preparar arquivos estáticos (public_html)
        run: |
          mkdir -p deploy_static/_next
          cp -r .next/static deploy_static/_next/static
          cp -r public/. deploy_static/

      - name: Upload arquivos do servidor via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_server/
          server-dir: domains/razepag.com/nodejs/
          dangerous-clean-slate: true

      - name: Upload arquivos estáticos para public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_static/
          server-dir: domains/razepag.com/public_html/
          dangerous-clean-slate: false
