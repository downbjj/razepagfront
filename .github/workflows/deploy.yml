name: Deploy Frontend para Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Preparar pasta de deploy
        run: |
          mkdir -p deploy_app
          cp server.js deploy_app/server.js
          cp package.json deploy_app/package.json
          cp -r public deploy_app/public
          cp -r .next deploy_app/.next
          rm -rf deploy_app/.next/cache

      - name: Upload para nodejs via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_app/
          server-dir: domains/razepag.com/nodejs/
          dangerous-clean-slate: false
          timeout: 600000
