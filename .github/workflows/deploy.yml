name: Deploy Frontend para Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Build e deploy no servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script: |
            APP_PATH="/home/u118244849/domains/razepag.com/nodejs"
            REPO_PATH="/home/u118244849/razepagfront"

            # Clona o repo se ainda não existir
            if [ ! -d "$REPO_PATH/.git" ]; then
              git clone https://github.com/downbjj/razepagfront.git "$REPO_PATH"
            fi

            echo "Atualizando código..."
            cd "$REPO_PATH"
            git fetch origin
            git reset --hard origin/main

            echo "Instalando dependências..."
            npm install

            echo "Buildando Next.js..."
            npm run build

            echo "Copiando arquivos para produção..."
            cp .next/standalone/server.js "$APP_PATH/server.js"

            rm -rf "$APP_PATH/.next"
            cp -r .next/standalone/.next "$APP_PATH/.next"
            cp -r .next/static "$APP_PATH/.next/static"

            rm -rf "$APP_PATH/public"
            cp -r public "$APP_PATH/public"

            echo "Reiniciando aplicação..."
            APP_PID=$(pgrep -f "razepag.com/nodejs/server.js" | head -1)
            if [ -n "$APP_PID" ]; then
              kill -USR2 "$APP_PID"
              echo "Sinal USR2 enviado para PID $APP_PID"
            else
              echo "PID não encontrado — reinicie manualmente via hPanel se necessário"
            fi

            echo "Deploy concluído!"
