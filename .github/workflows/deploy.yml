name: Deploy Frontend para Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Preparar arquivos
        run: |
          mkdir -p deploy_app
          cp server.js deploy_app/
          cp package.json deploy_app/
          cp -r public deploy_app/
          cp -r .next deploy_app/
          rm -rf deploy_app/.next/cache

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Enviar arquivos via SCP
        run: |
          scp -P ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -r deploy_app/* \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/u118244849/domains/razepag.com/nodejs/

      - name: Reiniciar processo via SSH
        run: |
          ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'APP_PID=$(pgrep -f "razepag.com/nodejs/server.js" | head -1); [ -n "$APP_PID" ] && kill -USR2 "$APP_PID" && echo "Reiniciado PID $APP_PID" || echo "PID não encontrado"'
