name: Build e Deploy Frontend

on:
  push:
    branches:
      - main
      - master
      - principal

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build
        run: npm run build

      - name: Publicar .next na branch implantar
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin implantar
          git checkout implantar
          git add .next -f
          git commit -m "ci: deploy $(date +%Y%m%d-%H%M%S) [skip ci]" || echo "Nada para commitar"
          git push origin implantar
