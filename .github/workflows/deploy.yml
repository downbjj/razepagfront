name: Deploy Frontend para Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            APP_PATH="/home/u118244849/domains/razepag.com/nodejs"
            REPO_PATH="/home/u118244849/razepagfront"

            if [ ! -d "$REPO_PATH/.git" ]; then
              git clone https://github.com/downbjj/razepagfront.git "$REPO_PATH"
            fi

            cd "$REPO_PATH"
            git fetch origin
            git reset --hard origin/main

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node | tail -1)/bin:$PATH"

            npm install
            npm run build

            cp server.js "$APP_PATH/server.js"
            rm -rf "$APP_PATH/.next"
            cp -r .next "$APP_PATH/.next"
            rm -rf "$APP_PATH/public"
            cp -r public "$APP_PATH/public"

            echo "Reiniciando processo..."
            APP_PID=$(pgrep -f "razepag.com/nodejs/server.js" | head -1)
            if [ -n "$APP_PID" ]; then
              kill -USR2 "$APP_PID"
              echo "Processo $APP_PID reiniciado"
            else
              echo "PID não encontrado — reinicie via hPanel se necessário"
            fi

            echo "Deploy concluído!"
