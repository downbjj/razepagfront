name: Deploy Frontend para Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            export PATH="/opt/alt/alt-nodejs22/root/usr/bin:$PATH"

            APP_PATH="/home/u118244849/domains/razepag.com/nodejs"
            REPO_PATH="/home/u118244849/razepagfront"

            echo "==> Atualizando código..."
            cd "$REPO_PATH"
            git fetch origin
            git reset --hard origin/main

            echo "==> Instalando dependências..."
            npm install --production=false

            echo "==> Fazendo build..."
            npm run build

            echo "==> Copiando arquivos para app..."
            cp server.js "$APP_PATH/server.js"
            rm -rf "$APP_PATH/.next"
            cp -r .next "$APP_PATH/.next"
            rm -rf "$APP_PATH/public"
            cp -r public "$APP_PATH/public"

            echo "==> Reiniciando aplicação..."
            APP_PID=$(pgrep -f "razepag.com/nodejs/server.js" | head -1)
            if [ -n "$APP_PID" ]; then
              kill -USR2 "$APP_PID"
              echo "Processo $APP_PID reiniciado com USR2"
            else
              echo "PID não encontrado — app pode reiniciar sozinha"
            fi

            echo "Deploy concluído!"
